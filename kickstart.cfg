##
## Install scripts
##

%post --interpreter=/bin/bash

# Disable all repos (air-gap installation: no internet access)
# Update if an internal mirror is available after installation.
sed -i 's/^metalink=.*//' /etc/yum.repos.d/*.repo 2>/dev/null || true
sed -i 's/^mirrorlist=.*//' /etc/yum.repos.d/*.repo 2>/dev/null || true
dnf config-manager --setopt=*.enabled=0 --save

# Disable SSH password authentication
#sed -i.post-install -e "s/PasswordAuthentication yes/PasswordAuthentication no/" /etc/ssh/sshd_config

# Passwordless sudo for the wheel group
sed -i.post-install -e "s/^%wheel\tALL=(ALL)\tALL/%wheel  ALL=(ALL)       NOPASSWD: ALL/" /etc/sudoers
grubby --set-default-index=0 || true

%end
