##
## Environment setup
##

# Where to fetch the installation tree
harddrive --partition=LABEL=CentOS-Stream-9-BaseOS-x86_64 --dir=/Packages
#url --url=http://192.168.122.1:8080/centos/9-stream/BaseOS/$basearch/os/

# Add the local mirrors as repositories
#repo --name=epel --baseurl=http://192.168.122.1:8080/epel/9/Everything/$basearch/
#repo --name=baseos --baseurl=http://192.168.122.1:8080/centos/9-stream/BaseOS/$basearch/os/
#repo --name=appstream --baseurl=http://192.168.122.1:8080/centos/9-stream/AppStream/$basearch/os/
#repo --name=rt --baseurl=http://192.168.122.1:8080/centos/9-stream/RT/$basearch/os/

# Install mode: text (interactive installs) or cmdline (unattended installs)
text

# French keyboard layout
keyboard --vckeymap=fr --xlayouts='fr'

# English i18n
lang en_US.UTF-8

# Accept the EULA
eula --agreed

# Which action to perform after install: poweroff or reboot
poweroff

##
## network configuration
##

# Configure the network
network  --bootproto=dhcp --device=enp1s0 --noipv6 --activate

# Set the hostname
network  --hostname=localhost.localdomain

# Timezone is GMT
timezone Etc/GMT --utc

##
## partitioning
##

# Install on /dev/vda
#ignoredisk --only-use=vda

# Install Grub in the MBR of /dev/vda
#bootloader --location=mbr --boot-drive=vda

# Clear the target disk
#zerombr

# Remove existing partitions
#clearpart --all --initlabel

# Automatically create partitions required by hardware platform
#reqpart

# Create the root partition
#part / --fstype xfs --size=1 --grow --asprimary --label=root

##
## User Accounts
##

# Generate an encrypted password with "openssl passwd -6"
rootpw --lock
#user --groups=wheel --name=admin --iscrypted --password=$6$REDACTED --gecos="Administrator"
user --name=virtu --iscrypted --password=$6$DTe5LrRNnTv3.VmZ$E7G3/HDqmmguMWuyMnFCeCVG5.bvQanNe5L90JG/WUE06NP4yV1xU1RYnu.OcfjMcf6q4zKXzIOyVWIyZmp.4. --shell=/bin/bash --groups=wheel

# Inject the SSH key of the admin
#sshkey --username admin "ssh-ed25519 REDACTED user@host"

##
## SELinux and Firewalld
##

#selinux --enforcing
#firewall --enabled --ssh
firewall --disable

##
